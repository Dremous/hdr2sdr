name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Flutter 前端：依赖安装 → 静态分析 → 测试
  # ──────────────────────────────────────────────
  flutter:
    name: Flutter (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # ──────────────────────────────────────────────
  # C++ 原生库：CMake 构建（需要 FFmpeg dev 包）
  # ──────────────────────────────────────────────
  native:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Linux — Ubuntu apt（pkg-config 自动搜索系统路径）
      - name: Install FFmpeg dev (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            cmake pkg-config

      # macOS — Homebrew（pkg-config 自动搜索 /usr/local 路径）
      - name: Install FFmpeg dev (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install ffmpeg cmake pkgconf

      # Windows — 使用系统安装的 vcpkg（GitHub Actions 预装在 C:\vcpkg）
      - name: Install FFmpeg via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkg = "C:\vcpkg\vcpkg.exe"
          if (-not (Test-Path $vcpkg)) {
            Write-Error "vcpkg not found at $vcpkg"
            exit 1
          }
          & $vcpkg install ffmpeg:x64-windows --recurse --clean-after-build
          $pkgCfgDir = "C:\vcpkg\installed\x64-windows\lib\pkgconfig"
          "PKG_CONFIG_PATH=$pkgCfgDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure CMake
        run: cmake -B build -S native

      - name: Build
        run: cmake --build build --config Release

      # ── 上传编译产物：各平台的动态库（即使编译失败也上传已有文件） ──
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libhdr_converter-${{ runner.os }}
          path: |
            build/*.dll
            build/*.pdb
            build/*.so
            build/*.dylib
            build/*.lib
            build/lib/**
            build/bin/**

  # ──────────────────────────────────────────────
  # Android APK 构建
  # ──────────────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Android NDK
        run: |
          NDK_DIR=$(ls -d "$ANDROID_HOME/ndk/"*/ 2>/dev/null | tail -1 | sed 's|/$||')
          if [ -z "$NDK_DIR" ]; then
            echo "错误: 未找到 Android NDK, 请先安装"
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "使用 NDK: $NDK_DIR"
      - name: Build native lib
        run: |
          chmod +x native/build_android.sh
          native/build_android.sh
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hdr2sdr-apk
          path: |
            build/app/outputs/flutter-apk/*.apk

  # ──────────────────────────────────────────────
  # iOS IPA 构建
  # ──────────────────────────────────────────────
  ios-build:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install cmake pkgconf ffmpeg
      - name: Build native lib
        run: |
          chmod +x native/build_ios.sh
          native/build_ios.sh
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --no-codesign --release
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hdr2sdr-ipa
          path: build/ios/iphoneos/Runner.app
