name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 桌面全平台构建：只需 Flutter（FFmpeg 运行时依赖系统安装）
  # ──────────────────────────────────────────────
  desktop-build:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── 安装 FFmpeg 运行时（用于测试，最终用户需自行安装） ──
      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgtk-3-dev

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg -y
          echo "FFMPEG_PATH=C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ── Flutter ──
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

      - name: Build desktop app
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            flutter build linux --release
          elif [ "$RUNNER_OS" = "Windows" ]; then
            flutter build windows --release
          else
            flutter build macos --release
          fi

      - name: Upload desktop app
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hdr2sdr-desktop-${{ runner.os }}
          path: |
            build/linux/x64/release/bundle/**
            build/windows/x64/runner/Release/**
            build/macos/Build/Products/Release/hdr2sdr.app/**

  # ──────────────────────────────────────────────
  # Android APK 构建（FFmpeg 二进制 + Flutter）
  # ──────────────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      # ── 安装构建依赖 ──
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm make cmake pkg-config git wget autoconf automake libtool

      - name: Install Android NDK
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/27.0.12077973" >> $GITHUB_ENV

      # ── 缓存 FFmpeg + x265 + z.lib 交叉编译产物 ──
      - name: Cache FFmpeg Android build
        uses: actions/cache@v4
        with:
          path: native/build/ffmpeg-android
          key: ffmpeg-android-${{ hashFiles('native/build_ffmpeg_android.sh') }}-v9

      - name: Build FFmpeg binary for Android
        run: |
          bash native/build_android.sh

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - run: flutter pub get

      - name: Patch plugin compileSdk
        run: |
          set -ex
          # 从 pubspec.lock 读取 resolved 版本，只 patch 实际使用的版本
          patch_compile_sdk() {
            local pkg="$1"
            local ver
            ver=$(grep -A8 "  $pkg:" pubspec.lock 2>/dev/null | grep "version:" | awk '{print $2}' | tr -d '"' || true)
            if [ -z "$ver" ]; then echo "  $pkg: 未在 lock 中找到"; return; fi
            local dir=$(find ~/.pub-cache -maxdepth 4 -type d -name "${pkg}-${ver}" 2>/dev/null | head -1)
            if [ -z "$dir" ]; then echo "  $pkg $ver: 缓存目录未找到"; return; fi
            echo "  $pkg $ver: $dir"
            find "$dir" -name "build.gradle" -exec sed -i 's/\(compileSdkVersion\s*=\?\)\s*[0-9]\+/\1 36/g' {} + 2>/dev/null || true
            find "$dir" -name "build.gradle" -exec sed -i 's/\(compileSdk\s*=\?\)\s*[0-9]\+/\1 36/g' {} + 2>/dev/null || true
            find "$dir" -name "build.gradle.kts" -exec sed -i 's/\(compileSdk\s*=\?\)\s*[0-9]\+/\1 36/g' {} + 2>/dev/null || true
          }
          patch_compile_sdk "file_picker"
          patch_compile_sdk "flutter_plugin_android_lifecycle"

      - name: Build APK
        run: flutter build apk --release
        continue-on-error: true

      - name: List APK output
        if: always()
        run: |
          find build -name "*.apk" -type f 2>/dev/null || true
          ls -la build/app/outputs/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hdr2sdr-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/**/*.apk

  # ──────────────────────────────────────────────
  # iOS 构建（仅编译验证，FFmpeg 运行时通过 subprocess 调用系统安装）
  # ──────────────────────────────────────────────
  ios-build:
    name: Build iOS IPA
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - run: flutter pub get
      - run: flutter build ios --no-codesign --release

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hdr2sdr-ipa
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/Release-iphoneos/Runner.app
