name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 桌面全平台构建：只需 Flutter（FFmpeg 运行时依赖系统安装）
  # ──────────────────────────────────────────────
  desktop-build:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── 安装 FFmpeg 运行时（用于测试，最终用户需自行安装） ──
      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgtk-3-dev

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg -y
          echo "FFMPEG_PATH=C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ── Flutter ──
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

      - name: Build desktop app
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            flutter build linux --release
          elif [ "$RUNNER_OS" = "Windows" ]; then
            flutter build windows --release
          else
            flutter build macos --release
          fi

      - name: Upload desktop app
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hdr2sdr-desktop-${{ runner.os }}
          path: |
            build/linux/x64/release/bundle/**
            build/windows/x64/runner/Release/**
            build/macos/Build/Products/Release/hdr2sdr.app/**

  # ──────────────────────────────────────────────
  # Android APK 构建（FFmpeg 二进制 + Flutter）
  # ──────────────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      # ── 安装构建依赖 ──
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm make cmake pkg-config git wget autoconf libtool

      - name: Install Android NDK
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/27.0.12077973" >> $GITHUB_ENV

      # ── 缓存 FFmpeg + x265 + z.lib 交叉编译产物 ──
      - name: Cache FFmpeg Android build
        uses: actions/cache@v4
        with:
          path: native/build/ffmpeg-android
          key: ffmpeg-android-${{ hashFiles('native/build_ffmpeg_android.sh') }}-v9

      - name: Build FFmpeg binary for Android
        run: |
          bash native/build_android.sh

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - run: flutter pub get

      - name: Patch file_picker compileSdk
        run: |
          set -ex
          FILE_PICKER_DIR=$(find ~/.pub-cache -maxdepth 4 -type d -name "file_picker-*" 2>/dev/null | head -1)
          if [ -n "$FILE_PICKER_DIR" ]; then
            find "$FILE_PICKER_DIR" -name "build.gradle" | while read f; do
              sed -i 's/\(compileSdkVersion\s*=\?\)\s*[0-9]\+/\1 36/g' "$f" 2>/dev/null || true
              sed -i 's/\(compileSdk\s*=\?\)\s*[0-9]\+/\1 36/g' "$f" 2>/dev/null || true
            done
            find "$FILE_PICKER_DIR" -name "build.gradle.kts" | while read f; do
              sed -i 's/\(compileSdk\s*=\?\)\s*[0-9]\+/\1 36/g' "$f" 2>/dev/null || true
            done
          fi
          LIFECYCLE_DIR=$(find ~/.pub-cache -maxdepth 4 -type d -name "flutter_plugin_android_lifecycle-*" 2>/dev/null | head -1)
          if [ -n "$LIFECYCLE_DIR" ]; then
            find "$LIFECYCLE_DIR" -name "build.gradle.kts" | while read f; do
              sed -i 's/\(compileSdk\s*=\?\)\s*[0-9]\+/\1 36/g' "$f" 2>/dev/null || true
            done
          fi

      - name: Build APK
        run: flutter build apk --release
        continue-on-error: true

      - name: List APK output
        if: always()
        run: |
          find build -name "*.apk" -type f 2>/dev/null || true
          ls -la build/app/outputs/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hdr2sdr-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/**/*.apk

  # ──────────────────────────────────────────────
  # iOS 构建（仅编译验证，FFmpeg 运行时通过 subprocess 调用系统安装）
  # ──────────────────────────────────────────────
  ios-build:
    name: Build iOS IPA
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - run: flutter pub get
      - run: flutter build ios --no-codesign --release

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hdr2sdr-ipa
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/Release-iphoneos/Runner.app
