name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Flutter 前端：依赖安装 → 静态分析 → 测试
  # ──────────────────────────────────────────────
  flutter:
    name: Flutter (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # ──────────────────────────────────────────────
  # C++ 原生库：CMake 构建（需要 FFmpeg dev 包）
  # ──────────────────────────────────────────────
  native:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Linux — Ubuntu apt（pkg-config 自动搜索系统路径）
      - name: Install FFmpeg dev (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            cmake pkg-config

      # macOS — Homebrew（pkg-config 自动搜索 /usr/local 路径）
      - name: Install FFmpeg dev (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install ffmpeg cmake pkgconf

      # Windows — 使用系统安装的 vcpkg（GitHub Actions 预装在 C:\vcpkg）
      - name: Install FFmpeg via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
        run: |
          $vcpkg = "C:\vcpkg\vcpkg.exe"
          if (-not (Test-Path $vcpkg)) {
            Write-Error "vcpkg not found at $vcpkg"
            exit 1
          }
          & $vcpkg install ffmpeg:x64-windows pkgconf:x64-windows --recurse --clean-after-build
          $pkgCfgDir = "C:\vcpkg\installed\x64-windows\lib\pkgconfig"
          "PKG_CONFIG_PATH=$pkgCfgDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PATH=$env:PATH;C:\vcpkg\installed\x64-windows\tools\pkgconf" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure CMake
        run: cmake -B build -S native

      - name: Build
        run: cmake --build build --config Release

      # ── 上传编译产物：各平台的动态库（即使编译失败也上传已有文件） ──
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libhdr_converter-${{ runner.os }}
          path: |
            build/*.dll
            build/*.pdb
            build/*.so
            build/*.dylib
            build/*.lib
            build/lib/**
            build/bin/**

  # ──────────────────────────────────────────────
  # Android APK 构建
  # ──────────────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - run: flutter pub get
      - name: Patch file_picker compileSdk
        run: |
          set -ex
          # 查找 file_picker 的 build 脚本（Groovy .gradle 或 Kotlin .gradle.kts）
          FILE_PICKER_DIR=$(find ~/.pub-cache -maxdepth 4 -type d -name "file_picker-*" 2>/dev/null | head -1)
          echo "file_picker dir: ${FILE_PICKER_DIR:-NOT FOUND}"
          if [ -n "$FILE_PICKER_DIR" ]; then
            # 列出目录内容以便调试
            find "$FILE_PICKER_DIR" -name "build.gradle*" -exec echo "Found: {}" \;
            # 修改 Groovy DSL 版本的 compileSdk
            find "$FILE_PICKER_DIR" -name "build.gradle" | while read f; do
              sed -i 's/\(compileSdkVersion\s*=\?\)\s*[0-9]\+/\1 36/g' "$f" 2>/dev/null || true
              sed -i 's/\(compileSdk\s*=\?\)\s*[0-9]\+/\1 36/g' "$f" 2>/dev/null || true
            done
            # 修改 Kotlin DSL 版本的 compileSdk
            find "$FILE_PICKER_DIR" -name "build.gradle.kts" | while read f; do
              sed -i 's/\(compileSdk\s*=\?\)\s*[0-9]\+/\1 36/g' "$f" 2>/dev/null || true
            done
          fi
          # 同样修改 flutter_plugin_android_lifecycle
          LIFECYCLE_DIR=$(find ~/.pub-cache -maxdepth 4 -type d -name "flutter_plugin_android_lifecycle-*" 2>/dev/null | head -1)
          echo "lifecycle dir: ${LIFECYCLE_DIR:-NOT FOUND}"
      - name: Build APK
        run: flutter build apk --release
        continue-on-error: true
      - name: List APK output
        if: always()
        run: |
          find build -name "*.apk" -type f 2>/dev/null || true
          ls -la build/app/outputs/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hdr2sdr-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/**/*.apk
            build/**/*.apk

  # ──────────────────────────────────────────────
  # iOS IPA 构建
  # ──────────────────────────────────────────────
  ios-build:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - run: flutter pub get
      - name: CocoaPods install
        run: |
          cd ios
          pod install --repo-update
      - name: Build IPA
        run: flutter build ios --no-codesign --release
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hdr2sdr-ipa
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/Release-iphoneos/Runner.app
            build/ios/*.app
